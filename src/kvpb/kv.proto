syntax = "proto3";
package kvpb;
option go_package = "kvgo/kvpb";

service KV {
    rpc Put(PutRequest) returns (PutResponse);
    rpc Get(GetRequest) returns (GetResponse);
}

message PutRequest {
    bytes key = 1;
    bytes value = 2;
}

message PutResponse {}

message GetRequest {
    bytes key = 1;
}

message GetResponse {
    bytes value = 1;
}
